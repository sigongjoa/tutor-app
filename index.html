<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>TutorFlow</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" rel="stylesheet">
<style>
/* ===== DESIGN TOKENS ===== */
:root {
  --font: 'Pretendard Variable', 'Pretendard', -apple-system, sans-serif;
  /* Warm palette — cream base, terracotta accent */
  --bg: #FAF8F5;
  --bg-elevated: #FFFFFF;
  --bg-recessed: #F3F0EB;
  --bg-hover: #EEEAE4;
  --text-primary: #2C2520;
  --text-secondary: #7A7067;
  --text-tertiary: #A8A099;
  --border: #E8E3DC;
  --border-light: #F0ECE6;
  --accent: #C05D3B;
  --accent-soft: #F4E8E2;
  --accent-hover: #A84E30;
  --green: #4A8B5C;
  --green-soft: #E3F0E7;
  --amber: #B8862B;
  --amber-soft: #F5EDD8;
  --red: #C0463B;
  --red-soft: #F4E2E0;
  --blue: #4A6FA5;
  --blue-soft: #E2EAF4;
  /* Spacing — 4pt base */
  --s1: 4px; --s2: 8px; --s3: 12px; --s4: 16px; --s5: 20px;
  --s6: 24px; --s7: 32px; --s8: 48px; --s9: 64px;
  /* Motion */
  --ease-out: cubic-bezier(0.25, 1, 0.5, 1);
  --ease-in: cubic-bezier(0.7, 0, 0.84, 0);
  --dur-fast: 120ms;
  --dur-med: 250ms;
  --dur-slow: 400ms;
  /* Radius */
  --r-sm: 6px; --r-md: 10px; --r-lg: 16px;
  /* Safe areas */
  --sat: env(safe-area-inset-top, 0px);
  --sab: env(safe-area-inset-bottom, 0px);
}

/* ===== RESET & BASE ===== */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html { font-size: 16px; -webkit-text-size-adjust: 100%; }
body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text-primary);
  line-height: 1.55;
  min-height: 100dvh;
  -webkit-font-smoothing: antialiased;
}
button, input, select, textarea { font: inherit; color: inherit; }
a { color: inherit; text-decoration: none; }

/* ===== MOCKUP BANNER ===== */
.mockup-bar {
  position: fixed; top: 0; left: 0; right: 0; z-index: 500;
  background: var(--accent);
  color: #fff;
  text-align: center;
  padding: var(--s1) var(--s4);
  font-size: 0.75rem;
  font-weight: 500;
  letter-spacing: 0.02em;
  height: 28px;
  display: flex; align-items: center; justify-content: center; gap: var(--s2);
}
.mockup-bar::before { content: ''; width: 6px; height: 6px; background: #fff; border-radius: 50%; opacity: .6; }

/* ===== LAYOUT: DESKTOP ===== */
.shell { display: flex; min-height: 100dvh; padding-top: 28px; }
.sidebar {
  width: 220px;
  background: var(--bg-elevated);
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column;
  position: fixed; top: 28px; bottom: 0; left: 0;
  z-index: 100;
}
.sidebar-brand {
  padding: var(--s6) var(--s5);
  font-size: 1.125rem;
  font-weight: 700;
  color: var(--accent);
  letter-spacing: -0.02em;
}
.sidebar-nav { flex: 1; padding: var(--s2) var(--s3); }
.sidebar-nav a {
  display: flex; align-items: center; gap: var(--s3);
  padding: var(--s3) var(--s3);
  border-radius: var(--r-sm);
  font-size: 0.875rem;
  font-weight: 450;
  color: var(--text-secondary);
  transition: background var(--dur-fast) var(--ease-out), color var(--dur-fast) var(--ease-out);
  margin-bottom: 2px;
  cursor: pointer;
}
.sidebar-nav a:hover { background: var(--bg-recessed); color: var(--text-primary); }
.sidebar-nav a.active { background: var(--accent-soft); color: var(--accent); font-weight: 600; }
.sidebar-nav a .nav-icon { width: 20px; text-align: center; font-size: 1rem; flex-shrink: 0; }
.sidebar-user {
  padding: var(--s4) var(--s5);
  border-top: 1px solid var(--border-light);
  display: flex; align-items: center; gap: var(--s3);
}
.sidebar-user-dot {
  width: 32px; height: 32px; border-radius: 50%;
  background: var(--accent); color: #fff;
  display: flex; align-items: center; justify-content: center;
  font-size: 0.8rem; font-weight: 600;
}
.sidebar-user-info { font-size: 0.8125rem; }
.sidebar-user-sub { font-size: 0.6875rem; color: var(--text-tertiary); }

.content { margin-left: 220px; flex: 1; padding: clamp(20px, 3vw, 40px); max-width: 1100px; }

/* ===== MOBILE LAYOUT ===== */
.mobile-header {
  display: none;
  position: fixed; top: 28px; left: 0; right: 0;
  background: var(--bg-elevated);
  border-bottom: 1px solid var(--border);
  padding: var(--s3) var(--s4);
  z-index: 100;
  height: 52px;
  align-items: center;
  justify-content: space-between;
}
.mobile-header-title { font-size: 1rem; font-weight: 700; color: var(--accent); }
.mobile-header-user {
  width: 28px; height: 28px; border-radius: 50%;
  background: var(--accent); color: #fff;
  display: flex; align-items: center; justify-content: center;
  font-size: 0.7rem; font-weight: 600;
}

.bottom-nav {
  display: none;
  position: fixed; bottom: 0; left: 0; right: 0;
  background: var(--bg-elevated);
  border-top: 1px solid var(--border);
  z-index: 100;
  padding: var(--s2) 0 calc(var(--s2) + var(--sab));
}
.bottom-nav-inner {
  display: flex; justify-content: space-around;
  max-width: 500px; margin: 0 auto;
}
.bottom-nav a {
  display: flex; flex-direction: column; align-items: center; gap: 2px;
  padding: var(--s1) var(--s2);
  font-size: 0.625rem;
  color: var(--text-tertiary);
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  transition: color var(--dur-fast) var(--ease-out);
  min-width: 56px;
}
.bottom-nav a .bnav-icon { font-size: 1.25rem; height: 24px; display: flex; align-items: center; justify-content: center; }
.bottom-nav a.active { color: var(--accent); font-weight: 600; }

@media (max-width: 768px) {
  .sidebar { display: none; }
  .mobile-header { display: flex; }
  .bottom-nav { display: block; }
  .content { margin-left: 0; padding: calc(52px + 28px + var(--s4)) var(--s4) calc(60px + var(--sab) + var(--s4)); max-width: 100%; }
}

/* ===== PAGE TRANSITIONS ===== */
.page { display: none; }
.page.active { display: block; animation: pageIn var(--dur-med) var(--ease-out); }
@keyframes pageIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

/* ===== TYPOGRAPHY ===== */
.heading-lg { font-size: clamp(1.25rem, 2vw, 1.5rem); font-weight: 700; letter-spacing: -0.02em; line-height: 1.3; }
.heading-md { font-size: 1.0625rem; font-weight: 650; letter-spacing: -0.01em; line-height: 1.35; }
.heading-sm { font-size: 0.875rem; font-weight: 600; letter-spacing: -0.005em; }
.text-sm { font-size: 0.8125rem; }
.text-xs { font-size: 0.75rem; }
.text-muted { color: var(--text-secondary); }
.text-faint { color: var(--text-tertiary); }

/* ===== PAGE HEADER ===== */
.page-top { margin-bottom: var(--s7); }
.page-top-row { display: flex; justify-content: space-between; align-items: flex-start; gap: var(--s4); flex-wrap: wrap; }
.page-top-sub { color: var(--text-tertiary); font-size: 0.8125rem; margin-top: var(--s1); }

/* ===== SECTION ===== */
.section { margin-bottom: var(--s7); }
.section-label {
  font-size: 0.6875rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--text-tertiary);
  margin-bottom: var(--s3);
}

/* ===== BUTTONS ===== */
.btn {
  display: inline-flex; align-items: center; gap: var(--s2);
  padding: var(--s2) var(--s4);
  border-radius: var(--r-sm);
  border: none; cursor: pointer;
  font-size: 0.8125rem;
  font-weight: 550;
  transition: all var(--dur-fast) var(--ease-out);
  -webkit-tap-highlight-color: transparent;
  white-space: nowrap;
}
.btn-accent { background: var(--accent); color: #fff; }
.btn-accent:hover { background: var(--accent-hover); }
.btn-accent:active { transform: scale(0.97); }
.btn-soft { background: var(--bg-recessed); color: var(--text-secondary); }
.btn-soft:hover { background: var(--bg-hover); color: var(--text-primary); }
.btn-ghost { background: none; color: var(--text-secondary); padding: var(--s2) var(--s3); }
.btn-ghost:hover { color: var(--text-primary); background: var(--bg-recessed); }
.btn-sm { padding: var(--s1) var(--s3); font-size: 0.75rem; }
@media (pointer: coarse) { .btn { padding: var(--s3) var(--s5); min-height: 44px; } .btn-sm { padding: var(--s2) var(--s4); min-height: 40px; } }
button:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

/* ===== BADGE ===== */
.tag {
  display: inline-flex; align-items: center;
  padding: 2px var(--s2);
  border-radius: 4px;
  font-size: 0.6875rem;
  font-weight: 550;
}
.tag-green { background: var(--green-soft); color: var(--green); }
.tag-amber { background: var(--amber-soft); color: var(--amber); }
.tag-red { background: var(--red-soft); color: var(--red); }
.tag-blue { background: var(--blue-soft); color: var(--blue); }

/* ===== STAT ROW ===== */
.stat-row {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
  gap: var(--s3);
  margin-bottom: var(--s7);
}
.stat-item {
  padding: var(--s4) var(--s5);
  background: var(--bg-elevated);
  border: 1px solid var(--border-light);
  border-radius: var(--r-md);
}
.stat-num { font-size: 1.75rem; font-weight: 700; letter-spacing: -0.03em; line-height: 1.2; }
.stat-label { font-size: 0.75rem; color: var(--text-tertiary); margin-top: 2px; }

/* ===== LIST ===== */
.list { background: var(--bg-elevated); border: 1px solid var(--border-light); border-radius: var(--r-md); overflow: hidden; }
.list-item {
  display: flex; align-items: center; gap: var(--s3);
  padding: var(--s4) var(--s5);
  border-bottom: 1px solid var(--border-light);
  cursor: pointer;
  transition: background var(--dur-fast) var(--ease-out);
  -webkit-tap-highlight-color: transparent;
}
.list-item:last-child { border-bottom: none; }
.list-item:hover { background: var(--bg-recessed); }
.list-item:active { background: var(--bg-hover); }
.list-body { flex: 1; min-width: 0; }
.list-title { font-size: 0.875rem; font-weight: 550; }
.list-sub { font-size: 0.75rem; color: var(--text-tertiary); margin-top: 1px; }
.list-right { display: flex; align-items: center; gap: var(--s2); flex-shrink: 0; }

/* ===== AVATAR ===== */
.av {
  width: 36px; height: 36px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 0.8rem; font-weight: 600; color: #fff; flex-shrink: 0;
}
.av-sm { width: 28px; height: 28px; font-size: 0.7rem; }

/* ===== PROGRESS ===== */
.prog { height: 4px; background: var(--bg-recessed); border-radius: 2px; overflow: hidden; }
.prog-fill { height: 100%; border-radius: 2px; transition: width var(--dur-slow) var(--ease-out); }

/* ===== FORM ===== */
.field { margin-bottom: var(--s4); }
.field-label { display: block; font-size: 0.75rem; font-weight: 550; color: var(--text-secondary); margin-bottom: var(--s1); }
.field-input {
  width: 100%; padding: var(--s3) var(--s3);
  border: 1px solid var(--border);
  border-radius: var(--r-sm);
  font-size: 0.875rem;
  background: var(--bg-elevated);
  transition: border var(--dur-fast) var(--ease-out);
}
.field-input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
select.field-input { appearance: auto; }
textarea.field-input { resize: vertical; min-height: 80px; }
@media (pointer: coarse) { .field-input { padding: var(--s3) var(--s4); font-size: 1rem; min-height: 48px; } }

/* ===== UPLOAD ZONE ===== */
.upload-zone {
  border: 1.5px dashed var(--border);
  border-radius: var(--r-md);
  padding: var(--s8) var(--s6);
  text-align: center;
  cursor: pointer;
  transition: border-color var(--dur-fast) var(--ease-out), background var(--dur-fast) var(--ease-out);
  background: var(--bg-elevated);
}
.upload-zone:hover { border-color: var(--accent); background: var(--accent-soft); }
.upload-zone:active { transform: scale(0.995); }
.upload-icon { font-size: 2rem; margin-bottom: var(--s3); opacity: .5; }

/* ===== INLINE PANEL (replaces modals) ===== */
.panel {
  background: var(--bg-elevated);
  border: 1px solid var(--border-light);
  border-radius: var(--r-md);
  overflow: hidden;
}
.panel-header {
  padding: var(--s4) var(--s5);
  display: flex; justify-content: space-between; align-items: center;
  border-bottom: 1px solid var(--border-light);
}
.panel-body { padding: var(--s5); }

/* ===== REPORT BLOCK ===== */
.report-text {
  background: var(--bg-recessed);
  border-radius: var(--r-sm);
  padding: var(--s5);
  font-size: 0.8125rem;
  line-height: 1.8;
  white-space: pre-wrap;
  color: var(--text-primary);
  border: 1px solid var(--border-light);
}

/* ===== PROCESS STEPS ===== */
.steps { display: flex; flex-direction: column; gap: var(--s3); }
.step {
  display: flex; align-items: center; gap: var(--s3);
  padding: var(--s3) var(--s4);
  border-radius: var(--r-sm);
  background: var(--bg-recessed);
  font-size: 0.8125rem;
  transition: background var(--dur-fast) var(--ease-out);
}
.step.is-active { background: var(--accent-soft); }
.step.is-done { background: var(--green-soft); }
.step-dot {
  width: 24px; height: 24px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 0.7rem; font-weight: 600;
  background: var(--bg-hover); color: var(--text-tertiary);
  flex-shrink: 0;
}
.step.is-active .step-dot { background: var(--accent); color: #fff; }
.step.is-done .step-dot { background: var(--green); color: #fff; }

/* ===== SCHEDULE GRID ===== */
.sched { display: grid; grid-template-columns: 56px repeat(7, 1fr); border: 1px solid var(--border-light); border-radius: var(--r-md); overflow: hidden; background: var(--bg-elevated); }
.sched-h { padding: var(--s2) var(--s1); font-size: 0.6875rem; font-weight: 600; text-align: center; background: var(--bg-recessed); color: var(--text-secondary); border-bottom: 1px solid var(--border-light); }
.sched-t { padding: var(--s3) var(--s1); font-size: 0.6875rem; text-align: center; color: var(--text-tertiary); border-right: 1px solid var(--border-light); border-bottom: 1px solid var(--border-light); display: flex; align-items: center; justify-content: center; }
.sched-c { border-right: 1px solid var(--border-light); border-bottom: 1px solid var(--border-light); padding: 3px; min-height: 52px; }
.sched-c:nth-child(8n) { border-right: none; }
.sched-block {
  padding: 4px 6px; border-radius: 4px; font-size: 0.625rem; font-weight: 550;
  line-height: 1.3; cursor: pointer;
  transition: transform var(--dur-fast) var(--ease-out);
}
.sched-block:active { transform: scale(0.95); }

/* ===== CHECKBOX ===== */
.check-row {
  display: flex; align-items: center; gap: var(--s3);
  padding: var(--s3) 0;
  border-bottom: 1px solid var(--border-light);
  font-size: 0.8125rem;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}
.check-row:last-child { border-bottom: none; }
.check-row input[type=checkbox] { width: 18px; height: 18px; accent-color: var(--accent); flex-shrink: 0; }
.check-row.is-done label { text-decoration: line-through; color: var(--text-tertiary); }

/* ===== INLINE EXPAND (no modals) ===== */
.expand-content {
  display: grid;
  grid-template-rows: 0fr;
  transition: grid-template-rows var(--dur-med) var(--ease-out);
}
.expand-content.open { grid-template-rows: 1fr; }
.expand-inner { overflow: hidden; }

/* ===== DRIVE LINK ===== */
.drive-row {
  display: flex; align-items: center; gap: var(--s3);
  padding: var(--s3) var(--s4);
  background: var(--bg-recessed);
  border-radius: var(--r-sm);
  margin-bottom: var(--s2);
  font-size: 0.8125rem;
  transition: background var(--dur-fast) var(--ease-out);
}
.drive-row:hover { background: var(--bg-hover); }

/* ===== DETAIL TABS ===== */
.dtabs {
  display: flex; gap: var(--s1); border-bottom: 1.5px solid var(--border);
  margin-bottom: var(--s6);
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
}
.dtab {
  padding: var(--s3) var(--s4);
  font-size: 0.8125rem; font-weight: 500;
  color: var(--text-tertiary);
  border: none; background: none; cursor: pointer;
  border-bottom: 2px solid transparent;
  margin-bottom: -1.5px;
  white-space: nowrap;
  transition: color var(--dur-fast) var(--ease-out), border-color var(--dur-fast) var(--ease-out);
}
.dtab:hover { color: var(--text-secondary); }
.dtab.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: 600; }

/* ===== 2-COL ===== */
.two-col { display: grid; grid-template-columns: 1fr 1fr; gap: var(--s5); }
@media (max-width: 640px) { .two-col { grid-template-columns: 1fr; } }

/* ===== TOAST ===== */
.toast {
  position: fixed; bottom: calc(70px + var(--sab)); left: 50%; z-index: 400;
  background: var(--text-primary); color: var(--bg);
  padding: var(--s3) var(--s5);
  border-radius: var(--r-md);
  font-size: 0.8125rem; font-weight: 500;
  transform: translate(-50%, 20px); opacity: 0;
  transition: all var(--dur-med) var(--ease-out);
  pointer-events: none;
  max-width: calc(100vw - 32px);
  text-align: center;
}
.toast.show { transform: translate(-50%, 0); opacity: 1; }
@media (min-width: 769px) { .toast { bottom: 32px; } }

/* ===== SPINNER ===== */
@keyframes spin { to { transform: rotate(360deg); } }
.spinner { width: 14px; height: 14px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .7s linear infinite; display: inline-block; }

/* ===== BACK BTN ===== */
.back-link {
  display: inline-flex; align-items: center; gap: var(--s2);
  font-size: 0.8125rem; color: var(--text-tertiary);
  margin-bottom: var(--s4); cursor: pointer;
  transition: color var(--dur-fast) var(--ease-out);
}
.back-link:hover { color: var(--text-primary); }
</style>
</head>

<div class="mockup-bar">MOCKUP 프로토타입 — 실제 데이터가 아닌 목업입니다</div>

</div>

<div class="shell">
  <!-- Desktop Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-brand">TutorFlow</div>
    <nav class="sidebar-nav" id="sideNav"></nav>
    <div class="sidebar-user">
      <div class="sidebar-user-dot">김</div>
      <div class="sidebar-user-info">
        <div style="font-weight:550">김선생</div>
        <div class="sidebar-user-sub">수학 · 과학</div>

  <!-- Content -->
  <main class="content" id="app"></main>
</div>

<!-- Mobile Bottom Nav -->
<div class="bottom-nav"><div class="bottom-nav-inner" id="bottomNav"></div></div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>

const S = [

function toggleHw(hid,idx){

  h.items[idx].d=!h.items[idx].d;
  const d=h.items.filter(i=>i.d).length;
  h.status=d===h.items.length?'완료':d>0?'진행중':'미시작';
  render(); toast(h.items[idx].d?'완료 처리':'미완료로 변경');
}

/* ---- UPLOAD ---- */
function rUpload(){
  return `
  <div class="page-top"><div class="heading-lg">수업 녹화 업로드</div><div class="page-top-sub">녹화 파일 → AI 리포트 자동 생성</div></div>
  <div id="uForm">
    <div class="two-col" style="margin-bottom:var(--s5)">
      <div class="field"><label class="field-label">학생</label>
        <select class="field-input" id="uSel"><option value="">선택</option>${S.map(s=>`<option value="${s.id}">${s.nm} (${s.gr} · ${s.sub})</option>`).join('')}</select>
      </div>
      <div class="field"><label class="field-label">날짜</label><input type="date" class="field-input" value="2026-04-13"></div>
    </div>
    <div class="upload-zone" onclick="startU()">
      <div class="upload-icon">△</div>
      <div class="heading-sm">녹화 파일 업로드</div>
      <div class="text-sm text-muted" style="margin-top:var(--s1)">MP4, WebM, MKV · 최대 2시간</div>
      <div class="text-xs text-faint" style="margin-top:var(--s3)">목업에서는 클릭하면 시뮬레이션됩니다</div>
    </div>
  </div>
  <div id="uProc" style="display:none"></div>
  <div id="uDone" style="display:none"></div>`;
}

const PSTEPS=[
  {t:'음성 추출',s:'mp4 → 오디오 분리'},
  {t:'30초 청크 분할',s:'청크 생성'},
  {t:'음성 인식',s:'Gemma 4 E4B · 한국어 STT'},
  {t:'수업 요약',s:'Gemma 4 27B'},
  {t:'리포트 생성',s:'학부모 리포트 작성'}
];

function startU(){
  const v=document.getElementById('uSel').value;
  if(!v){toast('학생을 선택해주세요');return}
  const s=gs(+v);
  document.getElementById('uForm').style.display='none';
  const proc=document.getElementById('uProc');proc.style.display='block';
  proc.innerHTML=`<div class="panel"><div class="panel-header"><span class="heading-sm">분석 중</span><span class="text-xs text-faint">${s.nm} · 4/13</span></div>
    <div class="panel-body"><div class="steps" id="uSteps">${PSTEPS.map((p,i)=>`<div class="step" id="us${i}"><div class="step-dot">${i+1}</div><div><div class="text-sm" style="font-weight:550">${p.t}</div><div class="text-xs text-faint">${p.s}</div></div></div>`).join('')}</div></div></div>`;

  let i=0;const subs=['분리 완료','237개 청크','237/237 완료','요약 완료','작성 완료'];
  function next(){
    if(i>0){const p=document.getElementById('us'+(i-1));p.className='step is-done';p.querySelector('.step-dot').textContent='✓';p.querySelector('.text-xs').textContent=subs[i-1]}
    if(i<PSTEPS.length){const c=document.getElementById('us'+i);c.className='step is-active';c.querySelector('.step-dot').innerHTML='<span class="spinner"></span>';i++;setTimeout(next,600+Math.random()*300)}
    else{proc.style.display='none';showUDone(s)}
  }
  next();
}

function showUDone(s){
  const r=REP.find(x=>x.sid===s.id)||REP[0];
  const d=document.getElementById('uDone');d.style.display='block';
  d.innerHTML=`<div class="panel">
    <div class="panel-header"><span class="heading-sm">리포트 완성</span><span class="tag tag-green">생성 완료</span></div>
    <div class="panel-body">
      <div class="text-sm text-muted" style="margin-bottom:var(--s4)">${s.nm} · 4월 13일</div>
      <div class="report-text">${r.txt}</div>
      <div style="display:flex;gap:var(--s3);margin-top:var(--s5);flex-wrap:wrap">
        <button class="btn btn-accent" onclick="copyR(\`${r.txt.replace(/`/g,"'")}\`)">리포트 복사</button>
        <button class="btn btn-soft" onclick="toast('목업: 수정 모드')">수정</button>
        <button class="btn btn-soft" onclick="toast('목업: 진도 업데이트')">진도 반영</button>
      </div>
    </div>
  </div>`;
}

function copyR(t){navigator.clipboard.writeText(t).then(()=>toast('클립보드에 복사됨')).catch(()=>toast('복사 완료 (목업)'))}

/* ---- REPORTS ---- */
function rReports(){
  const fs=['전체','미발송','검토중','발송완료'];
  const list=repFilter==='전체'?REP:REP.filter(r=>r.st===repFilter);
  return `
  <div class="page-top"><div class="heading-lg">학부모 리포트</div></div>
  <div class="dtabs" style="margin-bottom:var(--s5)">
    ${fs.map(f=>{const n=f==='전체'?REP.length:REP.filter(r=>r.st===f).length;return `<button class="dtab ${repFilter===f?'active':''}" onclick="repFilter='${f}';render()">${f} (${n})</button>`}).join('')}
  </div>
  <div class="list">
    ${list.map(r=>{const s=gs(r.sid);return `<div class="list-item" onclick="viewRep(${r.id})">
      <div class="av av-sm" style="background:${s.c}">${s.ini[0]}</div>
      <div class="list-body">
        <div class="list-title">${s.nm} <span class="text-xs text-faint">${r.dt}</span></div>
        <div class="list-sub">${r.topic}</div>
      </div>
      <div class="list-right" style="gap:var(--s2)">
        <span class="tag tag-${r.st==='발송완료'?'green':r.st==='검토중'?'amber':'red'}">${r.st}</span>
        ${r.st!=='발송완료'?`<button class="btn btn-accent btn-sm" onclick="event.stopPropagation();sendRep(${r.id})">발송</button>`:''}
      </div>
    </div>`}).join('')}
  </div>`;
}

function viewRep(id){
  const r=REP.find(x=>x.id===id);if(!r)return;const s=gs(r.sid);
  /* inline expand at top of content */
  const existing=document.getElementById('repView');if(existing)existing.remove();
  const div=document.createElement('div');div.id='repView';
  div.innerHTML=`<div class="panel" style="margin-bottom:var(--s5)">
    <div class="panel-header">
      <div><span class="heading-sm">${s.nm} · ${r.dt}</span> <span class="tag tag-${r.st==='발송완료'?'green':r.st==='검토중'?'amber':'red'}" style="margin-left:var(--s2)">${r.st}</span></div>
      <button class="btn btn-ghost btn-sm" onclick="this.closest('#repView').remove()">닫기</button>
    </div>
    <div class="panel-body">
      <div class="report-text">${r.txt}</div>
      <div style="display:flex;gap:var(--s3);margin-top:var(--s4);flex-wrap:wrap">
        <button class="btn btn-accent btn-sm" onclick="copyR(\`${r.txt.replace(/`/g,"'")}\`)">복사</button>
        ${r.st!=='발송완료'?`<button class="btn btn-soft btn-sm" onclick="sendRep(${r.id});this.closest('#repView').remove()">발송 처리</button>`:''}
      </div>
    </div>
  </div>`;
  document.getElementById('app').querySelector('.page').prepend(div);
  div.scrollIntoView({behavior:'smooth',block:'start'});
}

function sendRep(id){const r=REP.find(x=>x.id===id);if(r){r.st='발송완료';render();toast('발송 완료')}}

/* ---- MATERIALS ---- */
function rMats(){
  return `
  <div class="page-top"><div class="page-top-row"><div class="heading-lg">교재 · 자료</div>
    <button class="btn btn-soft" onclick="toast('목업: 자료 추가')">+ 추가</button></div></div>
  <div class="two-col">
    <div>
      <div class="section-label">교재 진도</div>
      ${S.map(s=>{const p=Math.round(s.cp/s.tp*100);return `<div style="margin-bottom:var(--s5);cursor:pointer" onclick="go('student-detail',${s.id})">
        <div style="display:flex;justify-content:space-between;margin-bottom:var(--s1)">
          <div class="text-sm" style="font-weight:550">${s.book}</div>
          <div class="text-xs text-faint">${p}%</div>
        </div>
        <div class="text-xs text-faint" style="margin-bottom:var(--s1)">${s.nm}</div>
        <div class="prog"><div class="prog-fill" style="width:${p}%;background:${s.c}"></div></div>
      </div>`}).join('')}
    </div>
    <div>
      <div class="section-label">최근 자료</div>
      ${MAT.map(m=>{const s=gs(m.sid);return `<div class="drive-row">
        <span style="opacity:.4">📄</span>
        <div style="flex:1;min-width:0"><div class="text-sm" style="font-weight:550">${m.nm}</div><div class="text-xs text-faint">${s?s.nm:''} · ${m.dt}</div></div>
        <button class="btn btn-ghost btn-sm" onclick="event.stopPropagation();toast('목업: Drive 열기')">열기</button>
      </div>`}).join('')}
    </div>
  </div>`;
}

/* ---- SCHEDULE ---- */
function rSched(){
  const times=['14:00','16:00','17:00','19:00'];
  return `
  <div class="page-top"><div class="page-top-row"><div class="heading-lg">수업 일정</div>
    <button class="btn btn-soft" onclick="toast('목업: 수업 추가')">+ 추가</button></div></div>
  <div class="sched">
    <div class="sched-h"></div>${[1,2,3,4,5,6,7].map(d=>`<div class="sched-h">${DN[d]} ${12+d}</div>`).join('')}
    ${times.map(t=>`<div class="sched-t">${t}</div>${[1,2,3,4,5,6,7].map(d=>{
      const m=SCHED.find(sc=>sc.t===t&&sc.days.includes(d));
      if(m){const s=gs(m.sid);return `<div class="sched-c"><div class="sched-block" style="background:${s.c}18;color:${s.c}" onclick="go('student-detail',${s.id})">${s.nm}<br><span style="opacity:.6">${s.sub}</span></div></div>`}
      return '<div class="sched-c"></div>';
    }).join('')}`).join('')}
  </div>`;
}

renderNav(); render();
