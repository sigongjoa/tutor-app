<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TutorFlow - 과외 관리 시스템</title>
<style>
:root{--primary:#4F46E5;--primary-light:#818CF8;--primary-bg:#EEF2FF;--success:#10B981;--success-bg:#D1FAE5;--warning:#F59E0B;--warning-bg:#FEF3C7;--danger:#EF4444;--danger-bg:#FEE2E2;--g50:#F9FAFB;--g100:#F3F4F6;--g200:#E5E7EB;--g300:#D1D5DB;--g400:#9CA3AF;--g500:#6B7280;--g600:#4B5563;--g700:#374151;--g800:#1F2937;--g900:#111827;--r:12px;--sh:0 1px 3px rgba(0,0,0,.1)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--g50);color:var(--g800);display:flex;min-height:100vh}

/* Mockup Banner */
.mockup-banner{position:fixed;top:0;left:0;right:0;z-index:999;background:linear-gradient(135deg,#F59E0B,#D97706);color:#fff;text-align:center;padding:10px;font-size:14px;font-weight:600;letter-spacing:.5px}
.mockup-banner span{background:rgba(0,0,0,.2);padding:2px 10px;border-radius:12px;font-size:12px;margin-left:8px}

/* Sidebar */
.sidebar{width:250px;background:var(--g900);color:#fff;padding:60px 14px 20px;display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:100}
.logo{font-size:20px;font-weight:700;padding:0 10px 20px;border-bottom:1px solid var(--g700);margin-bottom:20px;display:flex;align-items:center;gap:8px}
.logo span{color:var(--primary-light)}
nav{flex:1}
nav a{display:flex;align-items:center;gap:10px;padding:11px 12px;color:var(--g400);text-decoration:none;border-radius:8px;margin-bottom:3px;font-size:14px;transition:.15s}
nav a:hover{background:var(--g700);color:#fff}
nav a.active{background:var(--primary);color:#fff}
nav a svg{width:18px;height:18px;flex-shrink:0}
.user-info{border-top:1px solid var(--g700);padding-top:14px;display:flex;align-items:center;gap:10px}
.user-avatar{width:34px;height:34px;background:var(--primary);border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:600;font-size:13px}
.user-name{font-size:13px;font-weight:500}
.user-role{font-size:11px;color:var(--g400)}

/* Main */
.main{margin-left:250px;flex:1;padding:70px 28px 28px}
.page{display:none}.page.active{display:block}
.page-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px}
.page-header h1{font-size:24px;font-weight:700}
.subtitle{color:var(--g500);font-size:13px;margin-top:3px}

/* Cards */
.card{background:#fff;border-radius:var(--r);box-shadow:var(--sh);padding:20px;margin-bottom:16px}
.card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.card-header h3{font-size:15px;font-weight:600}

/* Stats */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px}
.stat-card{background:#fff;border-radius:var(--r);box-shadow:var(--sh);padding:18px}
.stat-icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;margin-bottom:10px;font-size:20px}
.stat-value{font-size:26px;font-weight:700}
.stat-label{font-size:12px;color:var(--g500);margin-top:3px}

/* Buttons */
.btn{padding:9px 18px;border-radius:8px;border:none;cursor:pointer;font-size:13px;font-weight:500;display:inline-flex;align-items:center;gap:6px;transition:.15s}
.btn-primary{background:var(--primary);color:#fff}.btn-primary:hover{background:#4338CA}
.btn-secondary{background:var(--g100);color:var(--g700)}.btn-secondary:hover{background:var(--g200)}
.btn-success{background:var(--success);color:#fff}
.btn-danger{background:var(--danger);color:#fff}
.btn-sm{padding:5px 12px;font-size:12px}

/* Tables */
table{width:100%;border-collapse:collapse}
th{text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--g500);padding:10px 14px;border-bottom:1px solid var(--g200)}
td{padding:12px 14px;border-bottom:1px solid var(--g100);font-size:13px}
tr:hover td{background:var(--g50)}

/* Badges */
.badge{display:inline-flex;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:500}
.badge-success{background:var(--success-bg);color:#065F46}
.badge-warning{background:var(--warning-bg);color:#92400E}
.badge-danger{background:var(--danger-bg);color:#991B1B}
.badge-info{background:var(--primary-bg);color:#3730A3}

/* Avatar */
.avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:600;font-size:12px;color:#fff;flex-shrink:0}
.avatar-row{display:flex;align-items:center;gap:10px}

/* Upload */
.upload-area{border:2px dashed var(--g300);border-radius:var(--r);padding:40px;text-align:center;cursor:pointer;transition:.2s;background:var(--g50)}
.upload-area:hover{border-color:var(--primary);background:var(--primary-bg)}
.upload-area .icon{font-size:40px;margin-bottom:8px}
.upload-main{font-size:15px;font-weight:500;color:var(--g700);margin-bottom:4px}
.upload-sub{color:var(--g500);font-size:13px}

/* Progress */
.progress-bar{background:var(--g200);border-radius:8px;height:8px;overflow:hidden}
.progress-fill{height:100%;border-radius:8px;transition:width .6s}

/* Forms */
.form-group{margin-bottom:16px}
.form-group label{display:block;font-size:13px;font-weight:500;margin-bottom:5px;color:var(--g700)}
.form-input{width:100%;padding:9px 12px;border:1px solid var(--g300);border-radius:8px;font-size:13px}
.form-input:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px rgba(79,70,229,.1)}
textarea.form-input{resize:vertical;min-height:100px}
select.form-input{appearance:auto}

/* Grid */
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px}

/* Tabs */
.tabs{display:flex;gap:4px;margin-bottom:20px;border-bottom:2px solid var(--g200)}
.tab{padding:9px 18px;font-size:13px;font-weight:500;color:var(--g500);border:none;background:none;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px}
.tab:hover{color:var(--g700)}.tab.active{color:var(--primary);border-bottom-color:var(--primary)}

/* Modal */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;align-items:center;justify-content:center}
.modal-overlay.active{display:flex}
.modal{background:#fff;border-radius:16px;padding:28px;width:520px;max-height:80vh;overflow-y:auto;box-shadow:var(--sh)}
.modal h2{font-size:18px;margin-bottom:20px}
.modal-actions{display:flex;justify-content:flex-end;gap:10px;margin-top:20px}

/* Report preview */
.report-preview{background:var(--g50);border:1px solid var(--g200);border-radius:var(--r);padding:20px;font-size:13px;line-height:1.8;white-space:pre-wrap}

/* Process steps */
.process-steps{display:flex;flex-direction:column;gap:12px;margin:20px 0}
.process-step{display:flex;align-items:center;gap:12px;padding:14px;background:var(--g50);border-radius:10px}
.process-step.active{background:var(--primary-bg)}
.process-step.done{background:var(--success-bg)}
.step-icon{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:var(--g200);font-size:13px;font-weight:600}
.process-step.active .step-icon{background:var(--primary);color:#fff}
.process-step.done .step-icon{background:var(--success);color:#fff}
.step-text{font-size:13px;font-weight:500}
.step-sub{font-size:11px;color:var(--g500)}

/* Schedule grid */
.sched-grid{display:grid;grid-template-columns:70px repeat(7,1fr);gap:1px;background:var(--g200);border-radius:8px;overflow:hidden}
.sched-head{background:var(--g50);padding:10px;font-size:12px;font-weight:600;text-align:center}
.sched-cell{background:#fff;padding:6px;min-height:60px}
.sched-time{background:#fff;padding:10px;font-size:12px;color:var(--g500);text-align:center;display:flex;align-items:center;justify-content:center}
.sched-block{padding:6px 8px;border-radius:4px;font-size:11px;border-left:3px solid}

/* Drive items */
.drive-item{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:var(--g50);border-radius:8px;margin-bottom:6px}
.drive-item:hover{background:var(--g100)}

/* Homework */
.hw-item{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--g100)}
.hw-item input[type=checkbox]{width:16px;height:16px;accent-color:var(--primary)}

/* Schedule item */
.sched-item{display:flex;align-items:center;gap:14px;padding:12px 0;border-bottom:1px solid var(--g100)}
.sched-item:last-child{border-bottom:none}

/* Spinner */
@keyframes spin{to{transform:rotate(360deg)}}
.spinner{width:18px;height:18px;border:2px solid var(--g200);border-top-color:var(--primary);border-radius:50%;animation:spin .8s linear infinite;display:inline-block}

/* Toast */
.toast{position:fixed;bottom:30px;right:30px;background:var(--g900);color:#fff;padding:14px 24px;border-radius:10px;font-size:14px;z-index:300;transform:translateY(100px);opacity:0;transition:.3s}
.toast.show{transform:translateY(0);opacity:1}

@media(max-width:768px){
  .sidebar{width:60px;padding:60px 8px 12px}
  .logo span,.sidebar nav a span,.user-info div:last-child{display:none}
  .main{margin-left:60px;padding:60px 16px 16px}
  .stats{grid-template-columns:repeat(2,1fr)}
  .grid-2{grid-template-columns:1fr}
  .sched-grid{font-size:10px}
}
</style>
</head>
<body>

<!-- Mockup Banner -->
<div class="mockup-banner">
  This is a MOCKUP prototype — 실제 데이터가 아닌 목업 데이터로 동작합니다

<script>
// ============ DATA ============
const STUDENTS = [

  {id:3,name:'김민서',initial:'김',color:'#10B981',grade:'중2',subject:'수학',parent:'김정호',textbook:'쎈 중2-1',currentPage:82,totalPages:150,chapter:'Ch.5 일차함수',schedule:'화/목 17:00',memo:'계산 속도 빠름, 서술형 문제 약함'},

const HOMEWORK = [

const REPORTS = [
  {id:1,studentId:1,date:'4/13',topic:'이차방정식의 활용',status:'검토중',text:`[수업 리포트] 박지현 · 4월 13일\n\n■ 오늘 수업 내용\n- 이차방정식의 활용 (교재 p.52~55)\n- 실생활 문제를 이차방정식으로 세우는 연습\n- 넓이, 연속하는 수, 시간/거리 문제 유형 학습\n\n■ 학습 태도 및 이해도\n- 방정식 세우기까지는 잘 하지만, 문제에서 조건을 놓치는 경우가 있음\n- 특히 "양수 조건" 확인을 빠뜨리는 실수 반복\n- 풀이 속도는 빨라지고 있으며, 근의 공식 적용은 안정적\n\n■ 숙제\n- 교재 p.56~58 연습문제 (1~12번)\n- 유인물 #7 (이차방정식 활용 심화)\n\n■ 다음 수업 예고\n- 이차함수 y=ax² 그래프 도입\n\n■ 선생님 코멘트\n지현이가 문장제 문제 해석력이 많이 좋아졌습니다.\n다만 답을 구한 후 문제 조건에 맞는지 검증하는 습관을 들이면 더 좋겠습니다.`},
  {id:2,studentId:2,date:'4/11',topic:'뉴턴의 제2법칙, F=ma',status:'미발송',text:`[수업 리포트] 이준호 · 4월 11일\n\n■ 오늘 수업 내용\n- 뉴턴의 제2법칙 F=ma 공식 유도\n- 힘, 질량, 가속도의 관계 실험 분석\n\n■ 학습 태도 및 이해도\n- 개념 이해는 빠르나 단위 환산에서 실수\n- 자유 물체도 그리기 연습 필요\n\n■ 숙제\n- 교재 p.36~38 문제풀이\n\n■ 다음 수업 예고\n- 뉴턴의 제3법칙 (작용-반작용)\n\n■ 선생님 코멘트\n준호가 물리에 흥미를 보이고 있어 좋습니다.`},

// ============ NAV ============
const NAV_ITEMS = [
  {id:'dashboard',icon:'📊',label:'대시보드'},
  {id:'students',icon:'👥',label:'학생 관리'},
  {id:'upload',icon:'📤',label:'수업 녹화 업로드'},
  {id:'reports',icon:'📝',label:'학부모 리포트'},

  {id:'schedule',icon:'📅',label:'수업 일정'}

let currentPage = 'dashboard';
let currentStudentId = null;
let reportFilter = '전체';

function renderNav(){
  document.getElementById('nav').innerHTML = NAV_ITEMS.map(n=>
    `<a href="#" data-page="${n.id}" class="${currentPage===n.id?'active':''}" onclick="navigate('${n.id}');return false;">
      ${n.icon} <span>${n.label}</span>
    </a>`
  ).join('');
}

function navigate(page, studentId){
  currentPage = page;
  if(studentId) currentStudentId = studentId;
  renderNav();
  render();
}

function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

function getStudent(id){ return STUDENTS.find(s=>s.id===id); }

// ============ RENDER ============
function render(){
  const app = document.getElementById('app');
  switch(currentPage){
    case 'dashboard': app.innerHTML = renderDashboard(); break;
    case 'students': app.innerHTML = renderStudents(); break;
    case 'student-detail': app.innerHTML = renderStudentDetail(); break;
    case 'upload': app.innerHTML = renderUpload(); break;
    case 'reports': app.innerHTML = renderReports(); break;
    case 'materials': app.innerHTML = renderMaterials(); break;
    case 'schedule': app.innerHTML = renderSchedule(); break;
  }
}

// ============ DASHBOARD ============
function renderDashboard(){
  const pending = REPORTS.filter(r=>r.status!=='발송완료').length;
  const hwBad = HOMEWORK.filter(h=>h.progress<50).length;

function showDetailTab(btn, id){
  btn.parentElement.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));

  ['dt-progress','dt-hw','dt-reports','dt-materials'].forEach(t=>{
    const el=document.getElementById(t);if(el)el.style.display=t===id?'block':'none';
  });
}

function toggleHw(hwId, itemIdx){
  const hw=HOMEWORK.find(h=>h.id===hwId);
  if(hw){
    hw.items[itemIdx].done=!hw.items[itemIdx].done;
    const done=hw.items.filter(i=>i.done).length;
    hw.progress=Math.round(done/hw.items.length*100);
    hw.status=hw.progress===100?'완료':hw.progress>0?'진행중':'미시작';
    render();
    toast(hw.items[itemIdx].done?'숙제 항목 완료!':'숙제 항목 미완료로 변경');
  }
}

  return `

      <div class="upload-sub">MP4, WebM, MKV (최대 2시간) — 목업에서는 클릭만 하면 시뮬레이션됩니다</div>
    </div>
  </div>
  <div class="card" id="upload-progress" style="display:none">
    <h3>수업 분석 중...</h3>
    <p style="color:var(--g500);font-size:13px;margin:4px 0 16px" id="upload-info"></p>
    <div class="process-steps" id="process-steps"></div>
    <div class="progress-bar" style="height:10px"><div class="progress-fill" id="total-progress" style="width:0%;background:var(--primary)"></div></div>
    <div style="text-align:center;margin-top:6px;font-size:12px;color:var(--g500)">예상 소요시간: 약 3분</div>
  </div>
  <div class="card" id="upload-done" style="display:none"></div>`;
}

const STEPS=[
  {text:'음성 추출',sub:'mp4에서 오디오 트랙 분리'},
  {text:'30초 청크 분할',sub:'청크 생성'},
  {text:'음성 인식 (Gemma 4 E4B)',sub:'한국어 STT 처리중...'},
  {text:'수업 내용 요약 (Gemma 4 27B)',sub:'내용 분석중...'},
  {text:'학부모 리포트 생성',sub:'리포트 작성중...'}
];

function startUpload(){
  const sid=document.getElementById('sel-student').value;
  if(!sid){toast('학생을 먼저 선택해주세요');return;}
  const s=getStudent(parseInt(sid));

  document.getElementById('upload-form').style.display='none';
  document.getElementById('upload-progress').style.display='block';
  document.getElementById('upload-info').textContent=`${s.name} · 2026.04.13 수업`;

  const stepsEl=document.getElementById('process-steps');
  stepsEl.innerHTML=STEPS.map((st,i)=>`
    <div class="process-step" id="pstep-${i}">
      <div class="step-icon" id="picon-${i}">${i+1}</div>
      <div><div class="step-text">${st.text}</div><div class="step-sub" id="psub-${i}">${st.sub}</div></div>
    </div>`).join('');

  let step=0;
  const pcts=[20,40,70,90,100];
  const subs=['오디오 트랙 분리 완료','237개 청크 생성 완료','237/237 청크 처리 완료','요약 완료','리포트 작성 완료'];

  function advance(){
    if(step>0){
      const prev=step-1;
      document.getElementById('pstep-'+prev).className='process-step done';
      document.getElementById('picon-'+prev).innerHTML='✓';
      document.getElementById('psub-'+prev).textContent=subs[prev];
    }
    if(step<STEPS.length){
      document.getElementById('pstep-'+step).className='process-step active';
      document.getElementById('picon-'+step).innerHTML='<span class="spinner"></span>';
      document.getElementById('total-progress').style.width=pcts[step]+'%';
      step++;
      setTimeout(advance, 800+Math.random()*400);
    } else {
      showUploadDone(s);
    }
  }
  advance();
}

function showUploadDone(s){
  document.getElementById('upload-progress').style.display='none';
  const done=document.getElementById('upload-done');
  done.style.display='block';

  const report = REPORTS.find(r=>r.studentId===s.id) || REPORTS[0];
  done.innerHTML=`
    <div style="text-align:center;padding:12px 0">
      <div style="font-size:40px">✅</div>
      <h3 style="margin-top:8px">리포트 생성 완료!</h3>
      <p style="color:var(--g500);font-size:13px;margin-top:4px">${s.name} · 2026.04.13 수업</p>
    </div>
    <div class="report-preview" style="margin-top:16px">${report.text}</div>
    <div style="display:flex;gap:10px;margin-top:16px;justify-content:center;flex-wrap:wrap">
      <button class="btn btn-secondary" onclick="toast('목업: 리포트 수정 모드')">수정하기</button>
      <button class="btn btn-primary" onclick="copyReport(\`${report.text.replace(/`/g,"'")}\`)">리포트 복사</button>
      <button class="btn btn-success" onclick="toast('목업: 진도 & 숙제 자동 업데이트 완료!')">진도 & 숙제 업데이트</button>
    </div>`;
}

function copyReport(text){
  navigator.clipboard.writeText(text).then(()=>toast('리포트가 클립보드에 복사되었습니다!')).catch(()=>toast('복사 완료 (목업)'));
}

          </div>
          <div class="progress-bar"><div class="progress-fill" style="width:${pct}%;background:${s.color}"></div></div>
        </div>`}).join('')}
    </div>
    <div class="card">
      <div class="card-header"><h3>최근 업로드 자료</h3></div>
      ${MATERIALS.map(m=>{const s=getStudent(m.studentId);return `
        <div class="drive-item">
          <div style="display:flex;align-items:center;gap:8px">
            <span>📄</span>
            <div><div style="font-weight:500;font-size:13px">${m.name}</div><div style="font-size:11px;color:var(--g500)">${s?s.name:''} · ${m.date}</div></div>
          </div>
          <button class="btn btn-sm btn-secondary" onclick="toast('목업: Google Drive 열기')">열기</button>
        </div>`}).join('')}
    </div>
  </div>`;
}

// ============ SCHEDULE ============
function renderSchedule(){
  const times=['14:00','16:00','17:00','19:00'];
  const days=[1,2,3,4,5,6,7];

  return `
  <div class="page-header"><div><h1>수업 일정</h1><div class="subtitle">이번 주 수업 일정</div></div>
    <button class="btn btn-primary" onclick="toast('목업: 수업 추가')">+ 수업 추가</button></div>
  <div class="card">
    <div class="sched-grid">
      <div class="sched-head"></div>
      ${days.map(d=>`<div class="sched-head">${DAY_NAMES[d]} (4/${12+d})</div>`).join('')}
      ${times.map(time=>`
        <div class="sched-time">${time}</div>
        ${days.map(day=>{
          const match=SCHEDULE_DATA.find(sc=>sc.time===time&&sc.days.includes(day));
          if(match){
            const s=getStudent(match.studentId);
            return `<div class="sched-cell"><div class="sched-block" style="background:${s.color}15;border-color:${s.color};cursor:pointer" onclick="navigate('student-detail',${s.id})"><div style="font-weight:600">${s.name}</div><div style="color:var(--g500)">${s.subject}</div></div></div>`;
          }
          return '<div class="sched-cell"></div>';
        }).join('')}
      `).join('')}
    </div>
  </div>`;
}

// ============ ADD STUDENT MODAL ============
function openAddStudent(){
  document.getElementById('modals').innerHTML=`
  <div class="modal-overlay active" onclick="if(event.target===this)this.classList.remove('active')">
    <div class="modal">
      <h2>학생 추가</h2>
      <div class="grid-2">
        <div class="form-group"><label>학생 이름</label><input type="text" class="form-input" id="ns-name" placeholder="홍길동"></div>
        <div class="form-group"><label>학년</label><select class="form-input" id="ns-grade"><option>중1</option><option>중2</option><option>중3</option><option>고1</option><option>고2</option><option>고3</option></select></div>
      </div>
      <div class="grid-2">
        <div class="form-group"><label>과목</label><input type="text" class="form-input" id="ns-subject" placeholder="수학"></div>
        <div class="form-group"><label>학부모 이름</label><input type="text" class="form-input" id="ns-parent" placeholder="홍부모"></div>
      </div>
      <div class="form-group"><label>사용 교재</label><input type="text" class="form-input" id="ns-textbook" placeholder="개념원리 중3-2"></div>
      <div class="form-group"><label>수업 요일/시간</label><input type="text" class="form-input" id="ns-schedule" placeholder="월/수/금 14:00"></div>
      <div class="modal-actions">
        <button class="btn btn-secondary" onclick="this.closest('.modal-overlay').classList.remove('active')">취소</button>
        <button class="btn btn-primary" onclick="addStudent()">추가</button>
      </div>
    </div>
  </div>`;
}

function addStudent(){
  const name=document.getElementById('ns-name').value||'새 학생';
  const colors=['#8B5CF6','#06B6D4','#F43F5E','#84CC16','#F97316'];
  STUDENTS.push({
    id:STUDENTS.length+1,name,initial:name[0],color:colors[STUDENTS.length%colors.length],
    grade:document.getElementById('ns-grade').value,
    subject:document.getElementById('ns-subject').value||'수학',
    parent:document.getElementById('ns-parent').value||'-',
    textbook:document.getElementById('ns-textbook').value||'-',
    currentPage:0,totalPages:100,chapter:'-',
    schedule:document.getElementById('ns-schedule').value||'-',memo:''
  });
  document.querySelector('.modal-overlay').classList.remove('active');
  render();
  toast(`${name} 학생이 추가되었습니다! (목업)`);
}

// ============ INIT ============
renderNav();
render();
</script>
</body>
</html>
